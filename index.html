<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments"></ul>

      <div id="auth-form" class="auth-form">
        <h3>Авторизация</h3>
        <input
          type="text"
          id="login-input"
          class="auth-form-input"
          placeholder="Логин"
        />
        <input
          type="password"
          id="password-input"
          class="auth-form-input"
          placeholder="Пароль"
        />
        <button id="login-button" class="auth-form-button">Войти</button>
      </div>

      <div id="add-form" class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
          id="add-form-name"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш комментарий"
          rows="4"
          id="add-form-text"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>

    <script type="module" src="jsmain.js" defer></script>
  </body>
</html>
